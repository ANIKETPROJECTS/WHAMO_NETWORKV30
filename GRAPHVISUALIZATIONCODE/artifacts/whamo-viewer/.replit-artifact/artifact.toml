kind = "web"
previewPath = "/"
title = "WHAMO Visualization"
version = "1.0.0"
id = "artifacts/whamo-viewer"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21454

[services.development]
run = "pnpm --filter @workspace/whamo-viewer run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/whamo-viewer", "run", "build" ]
publicDir = "artifacts/whamo-viewer/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21454"
BASE_PATH = "/"
